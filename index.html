<!DOCTYPE html>
<html lang="nl">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#16130e;min-height:100vh;}
.ds{
  --bg:#16130e;--card:#1f1b14;--br:#2a2318;--tx:#f0e8d8;--tx2:#e8dcc8;--mu:#6a5e4e;--su:#5a4a38;--di:#4a3e2e;
  --cb:#3a3020;--sc:#221c12;--sb:#332a1a;
  --gb:#181e24;--gr:#1e2e3a;--gc:#3a6a8a;--gl:#4a7a9a;--gn:#7ac4e8;
  --nb:#100e09;--pb:#2a2318;
  --hl:#1e3a54;--hf:#1a3d2a;--he:#2a2318;--hlc:#6bb3e8;--hfc:#4a9e6a;--hec:#3a3020;
  --ac:#3d2a0a;--a:#c27820;--a2:#d4944a;--wh:#221808;--nm:#2a3a4a;
  --fb:#1a1f1a;--fr:#2a3a2a;--ib:#0e0c08;--ic:#1a1710;--ir:#3a3020;
  font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--tx);
  min-height:100vh;max-width:480px;margin:0 auto;display:flex;flex-direction:column;
}
.ds.light{
  --bg:#faf6f0;--card:#fff;--br:#e8dfd4;--tx:#1a1510;--tx2:#2a2018;--mu:#8a7868;--su:#a09080;--di:#c0b0a0;
  --cb:#d4c8b8;--sc:#f5f0e8;--sb:#e0d4c4;
  --gb:#eef4f8;--gr:#c8dce8;--gc:#2a6a9a;--gl:#1a5a8a;--gn:#1a6a9a;
  --nb:#f0ece4;--pb:#e8dfd4;
  --hl:#c8ddf0;--hf:#c0e8d0;--he:#e8dfd4;--hlc:#1a5a8a;--hfc:#1a6a3a;--hec:#a09080;
  --ac:#fdf0e0;--a:#c27820;--a2:#d4944a;--wh:#fdf8f0;--nm:#a8c4d8;
  --fb:#f0f8f0;--fr:#c0dcc0;--ib:#f5f0e8;--ic:#fff;--ir:#d4c8b8;
}
.serif{font-family:'Playfair Display',Georgia,serif;}
.hdr{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--br);padding:12px 18px;display:flex;justify-content:space-between;align-items:center;}
.con{flex:1;overflow-y:auto;padding-bottom:72px;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--nb);border-top:1px solid var(--br);display:flex;z-index:20;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 14px;background:none;border:none;cursor:pointer;gap:3px;font-family:'DM Sans',sans-serif;}
.card{background:var(--card);border:1px solid var(--br);border-radius:14px;padding:16px;margin-bottom:10px;}
.sp-card{background:var(--sc);border:1px solid var(--sb);border-radius:12px;padding:14px;margin-bottom:8px;position:relative;}
.gar{background:var(--gb);border:1px solid var(--gr);border-radius:12px;padding:14px;margin-top:12px;}
.slaap-box{background:#12181a;border:1px solid #1e3040;border-radius:12px;padding:14px;margin-top:12px;}
.ds.light .slaap-box{background:#eef6fa;border-color:#b0d0e0;}
.fys{background:var(--fb);border:1px solid var(--fr);border-radius:12px;padding:14px;margin-top:12px;}
.avond-card{background:linear-gradient(135deg,#1a2420,#0e1812);border:1px solid #2a4a38;border-radius:14px;padding:16px;margin-bottom:10px;}
.ds.light .avond-card{background:linear-gradient(135deg,#f0f8f4,#e8f4f0);border-color:#a8d4c0;}
.profiel-card{background:linear-gradient(135deg,#1a1620,#120e1a);border:1px solid #3a2a4a;border-radius:14px;padding:16px;margin-bottom:10px;}
.ds.light .profiel-card{background:linear-gradient(135deg,#f8f4fc,#f0ecf8);border-color:#c8b8d8;}
.sync-card{background:linear-gradient(135deg,#0e1a20,#081218);border:1px solid #1e3a4a;border-radius:14px;padding:16px;margin-bottom:10px;}
.ds.light .sync-card{background:linear-gradient(135deg,#eef8fc,#e4f4f8);border-color:#a0cce0;}
.lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu);}
.lbl-g{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gc);}
.lbl-f{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#5a8a5a;}
.lbl-a{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#4a9e6a;}
.lbl-s{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#4a8aa8;}
.lbl-p{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#9a7ab8;}
.lbl-gh{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#4a8aaa;}
.chip{padding:8px 12px;border-radius:20px;border:1px solid var(--cb);background:transparent;color:#8a7a68;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap;}
.chip.on{background:var(--ac);border-color:#8a5020;color:var(--a2);}
.chip.sm{padding:6px 10px;font-size:12px;}
.chip.reis{border-color:#3a6a4a;color:#5a9a6a;}
.chip.reis.on{background:#1a3d2a;border-color:#2a7a4a;color:#4a9e6a;}
.ci-L.on{background:#1a3d2a!important;border-color:#2a6a3a!important;color:#4a9e6a!important;}
.ci-M.on{background:var(--ac)!important;border-color:#8a5020!important;color:#d4944a!important;}
.ci-H.on{background:#3d1a0a!important;border-color:#8a3020!important;color:#e06040!important;}
.slaap-btn{flex:1;padding:10px 4px;border-radius:10px;border:1px solid #1e3040;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;color:#4a8aa8;text-align:center;transition:all .15s;}
.slaap-btn.on{color:#fff;border-color:transparent;}
.ta{width:100%;background:transparent;border:none;color:var(--tx2);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.7;resize:none;min-height:80px;outline:none;}
.ta::placeholder{color:var(--di);}
.ta-p{width:100%;background:transparent;border:none;border-bottom:1px solid #3a2a4a;color:var(--tx2);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;resize:none;outline:none;padding:6px 0;}
.ta-p::placeholder{color:var(--di);}
.ni{width:100%;background:transparent;border:none;border-bottom:1px solid var(--nm);color:var(--gn);font-family:'DM Sans',sans-serif;font-size:30px;font-weight:500;text-align:center;outline:none;padding:8px 0 4px;}
.ni::placeholder{color:var(--gr);}
.prog{height:3px;background:var(--pb);border-radius:2px;overflow:hidden;margin-bottom:22px;}
.pf{height:100%;background:var(--a);border-radius:2px;transition:width .3s;}
.sn{font-size:11px;color:var(--mu);letter-spacing:1px;margin-bottom:8px;}
.sq{font-size:20px;color:var(--tx);line-height:1.35;margin-bottom:5px;}
.sh{font-size:12px;color:var(--su);margin-bottom:18px;}
.btn{width:100%;padding:15px;border-radius:14px;border:none;background:var(--a);color:#fff;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;cursor:pointer;margin-top:18px;}
.btn:disabled{background:var(--pb);color:var(--mu);cursor:default;}
.btn-bk{font-size:13px;color:var(--su);cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;padding:0;margin-bottom:18px;}
.pbn{flex:1;padding:10px 4px;border-radius:10px;border:1px solid var(--br);background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--mu);text-align:center;transition:all .15s;}
.pbn.on{color:#fff;border-color:transparent;}
.obn{flex:1;padding:12px 6px;border-radius:12px;border:1px solid var(--br);background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--mu);transition:all .15s;}
.obn.on{background:var(--ac);border-color:#8a5020;color:var(--a2);}
.tpill{display:flex;border-radius:20px;border:1px solid var(--gr);overflow:hidden;}
.tpill button{padding:7px 13px;background:transparent;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--gl);}
.tpill button.on{background:var(--gb);color:var(--gn);filter:brightness(1.3);}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.edb{background:transparent;border:1px solid var(--cb);color:var(--mu);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;margin-left:auto;}
.wbtn{width:100%;display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;border:1px solid var(--br);background:var(--card);cursor:pointer;text-align:left;margin-bottom:6px;font-family:'DM Sans',sans-serif;}
.wbody{border:1px solid var(--br);border-radius:12px;padding:8px;margin-bottom:10px;background:var(--card);}
.scrd{background:var(--card);border:1px solid var(--br);border-radius:14px;padding:16px;text-align:center;}
.hmap{display:flex;flex-wrap:wrap;gap:5px;}
.hc{width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;}
.empty{padding:48px 20px;text-align:center;color:var(--mu);font-size:14px;}
.cai{background:var(--card);border:1px solid var(--br);border-radius:14px 14px 14px 4px;padding:12px 14px;font-size:14px;line-height:1.65;color:var(--tx2);max-width:88%;align-self:flex-start;}
.cme{background:var(--ac);border:1px solid #5a3a10;border-radius:14px 14px 4px 14px;padding:12px 14px;font-size:14px;line-height:1.65;color:var(--tx);max-width:88%;align-self:flex-end;}
.cin{flex:1;background:var(--card);border:1px solid var(--cb);border-radius:10px;padding:10px 13px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;resize:none;min-height:40px;max-height:120px;line-height:1.5;}
.cin::placeholder{color:var(--di);}
.csnd{background:var(--a);border:none;border-radius:10px;padding:0 16px;color:#fff;cursor:pointer;font-size:18px;flex-shrink:0;height:40px;display:flex;align-items:center;}
.csnd:disabled{background:var(--pb);color:var(--mu);}
.mt{display:flex;gap:8px;margin-bottom:16px;}
.mb{flex:1;padding:11px;border-radius:10px;border:1px solid var(--br);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;background:var(--card);}
.asp{width:100%;padding:11px;border-radius:10px;border:1px dashed var(--cb);background:transparent;color:var(--mu);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;margin-top:4px;}
.rb{position:absolute;top:10px;right:10px;background:transparent;border:none;color:var(--su);cursor:pointer;font-size:16px;padding:2px 6px;}
.tbtn{background:transparent;border:1px solid var(--br);border-radius:20px;padding:5px 10px;cursor:pointer;font-size:13px;color:var(--mu);font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px;}
.sumc{background:var(--gb);border:1px solid var(--gr);border-radius:14px;padding:16px;margin-bottom:10px;}
.dbtn{padding:9px 14px;border-radius:10px;border:1px solid var(--br);background:transparent;color:var(--mu);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;}
.ivs{min-height:100vh;background:var(--ib);display:flex;flex-direction:column;}
.ivnx{width:100%;padding:16px;border-radius:14px;border:none;background:var(--a);color:#fff;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;cursor:pointer;}
.ivnx:disabled{background:var(--pb);color:var(--mu);}
.ivsb{flex:1;padding:11px;border-radius:12px;border:1px solid var(--ir);background:transparent;color:var(--mu);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}
.ivl{width:100%;padding:14px;border-radius:14px;border:1px solid var(--a);background:transparent;color:var(--a);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;}
.ivbox{background:var(--ic);border:1px solid var(--ir);border-radius:14px;padding:16px;min-height:80px;font-size:15px;color:var(--tx2);line-height:1.7;font-style:italic;}
.ivst{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;}
/* Setup overlay */
.setup{position:fixed;inset:0;background:#0a0806;display:flex;flex-direction:column;align-items:center;overflow-y:auto;padding:40px 24px 60px;z-index:200;}
.setup-card{width:100%;max-width:360px;background:#1a1510;border:1px solid #2a2010;border-radius:16px;padding:20px;margin-bottom:14px;}
.setup-input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid #3a3020;background:#0e0c08;color:#f0e8d8;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-top:10px;}
.setup-input::placeholder{color:#4a3e2e;}
.setup-btn{width:100%;max-width:360px;padding:15px;border-radius:14px;border:none;background:#c27820;color:#fff;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;cursor:pointer;margin-top:8px;}
.setup-skip{background:none;border:none;color:#5a4a38;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:14px;text-decoration:underline;}
.setup-link{font-size:11px;color:#5a7a6a;margin-top:6px;line-height:1.5;}
/* Sync indicator */
.sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin .8s linear infinite;display:inline-block;}
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}
.dots span{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--mu);margin:0 2px;animation:blink 1.4s infinite both;}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.92)}}
.recdot{width:12px;height:12px;border-radius:50%;background:#e06040;animation:pulse 1.2s infinite;}
@keyframes wv{0%,100%{height:4px}50%{height:18px}}
input[type="time"]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.4;cursor:pointer;}
.ds.light input[type="time"]::-webkit-calendar-picker-indicator{filter:none;opacity:.6;}
input[type="range"]{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:#1e3a54;outline:none;cursor:pointer;width:100%;}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:24px;height:24px;border-radius:50%;background:#3a6a8a;border:2px solid #7ac4e8;cursor:pointer;}
input[type="range"]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:#3a6a8a;border:2px solid #7ac4e8;cursor:pointer;border:none;}
.ds.light input[type="range"]{background:#b0cce0;}
.ds.light input[type="range"]::-webkit-slider-thumb{background:#2a6a9a;border-color:#1a5a8a;}
.ds.light input[type="range"]::-moz-range-thumb{background:#2a6a9a;border-color:#1a5a8a;}
.wb{width:3px;border-radius:2px;background:var(--a);display:inline-block;margin:0 2px;}
.wb:nth-child(1){animation:wv .8s infinite}.wb:nth-child(2){animation:wv .8s .1s infinite}
.wb:nth-child(3){animation:wv .8s .2s infinite}.wb:nth-child(4){animation:wv .8s .3s infinite}.wb:nth-child(5){animation:wv .8s .4s infinite}
.nav{padding-bottom:calc(14px + env(safe-area-inset-bottom));}
@supports(-webkit-touch-callout:none){.ds{min-height:-webkit-fill-available;}}
@media(min-width:640px){body{background:#0a0806;display:flex;align-items:flex-start;justify-content:center;padding:32px 0 0;}.ds{border-radius:24px 24px 0 0;box-shadow:0 -2px 80px rgba(0,0,0,.5);min-height:calc(100vh - 32px);}}
@keyframes pop{0%{transform:scale(.4);opacity:0}65%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes fadeUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

// ── localStorage ─────────────────────────────────────────────────────────────
const SK="ds_v1_";
async function sGet(k){try{const v=localStorage.getItem(SK+k);return v?JSON.parse(v):null;}catch{return null;}}
async function sSet(k,v){try{localStorage.setItem(SK+k,JSON.stringify(v));return true;}catch{return false;}}
async function sList(){try{const r=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith(SK))r.push(k.slice(SK.length));}return r;}catch{return[];}}

// ── Keys ──────────────────────────────────────────────────────────────────────
const getApiKey=()=>localStorage.getItem('ds_apikey')||'';
const saveApiKey=k=>k?localStorage.setItem('ds_apikey',k):localStorage.removeItem('ds_apikey');
const getGhToken=()=>localStorage.getItem('ds_gh_token')||'';
const saveGhToken=t=>t?localStorage.setItem('ds_gh_token',t):localStorage.removeItem('ds_gh_token');
const getGistId=()=>localStorage.getItem('ds_gist_id')||'';
const saveGistId=id=>id?localStorage.setItem('ds_gist_id',id):localStorage.removeItem('ds_gist_id');
const isSetupDone=()=>!!localStorage.getItem('ds_setup_done');
const markSetupDone=()=>localStorage.setItem('ds_setup_done','1');

// ── Anthropic API ─────────────────────────────────────────────────────────────
async function callApi(messages,system,maxTokens=1000){
  const key=getApiKey();if(!key)throw new Error('no-key');
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:maxTokens,system,messages})});
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  return d.content?.find(b=>b.type==="text")?.text||"…";
}

// ── GitHub Gist sync ──────────────────────────────────────────────────────────
const GIST_FILE='dagstart_data.json';
const GIST_DESC='Dagstart — privé sync';
const ghH=t=>({'Authorization':`token ${t}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'});

async function ghFindGist(token){
  // List all gists, find the Dagstart one by description + file
  let page=1;
  while(page<=5){
    const r=await fetch(`https://api.github.com/gists?per_page=100&page=${page}`,{headers:ghH(token)});
    if(!r.ok)throw new Error(`GitHub fout ${r.status}`);
    const gists=await r.json();if(!gists.length)break;
    const found=gists.find(g=>g.description===GIST_DESC&&g.files?.[GIST_FILE]);
    if(found)return found.id;
    if(gists.length<100)break;
    page++;
  }
  return null;
}

async function ghLoad(token,gistId){
  const r=await fetch(`https://api.github.com/gists/${gistId}`,{headers:ghH(token)});
  if(r.status===404)throw new Error('gist-not-found');
  if(!r.ok)throw new Error(`GitHub fout ${r.status}`);
  const d=await r.json();
  const content=d.files?.[GIST_FILE]?.content;
  if(!content)throw new Error('Bestand leeg');
  return JSON.parse(content);
}

async function ghCreate(token,data){
  const r=await fetch('https://api.github.com/gists',{method:'POST',headers:ghH(token),body:JSON.stringify({description:GIST_DESC,public:false,files:{[GIST_FILE]:{content:JSON.stringify(data)}}})});
  if(!r.ok)throw new Error(`GitHub fout ${r.status}`);
  return(await r.json()).id;
}

async function ghPush(token,gistId,data){
  const r=await fetch(`https://api.github.com/gists/${gistId}`,{method:'PATCH',headers:ghH(token),body:JSON.stringify({files:{[GIST_FILE]:{content:JSON.stringify(data)}}})});
  if(!r.ok)throw new Error(`GitHub fout ${r.status}`);
}

// Merge: per entry, highest timestamp wins
function mergeMap(local,remote){
  const m={...(remote||{})};
  for(const[k,v]of Object.entries(local||{})){
    if(!m[k]||(v?.timestamp||0)>(m[k]?.timestamp||0))m[k]=v;
  }
  return m;
}

// Full sync: load remote, merge, push merged back. Returns merged data.
async function syncAll(entries,avond,profiel){
  const token=getGhToken();
  if(!token)return{ok:false,msg:'Geen GitHub token'};
  try{
    let gistId=getGistId();
    // If no stored gist ID, search GitHub for existing one
    if(!gistId){gistId=await ghFindGist(token);if(gistId)saveGistId(gistId);}

    const payload={version:2,synced:new Date().toISOString(),entries,avond,profiel};

    if(!gistId){
      // First ever sync — create new gist
      gistId=await ghCreate(token,payload);
      saveGistId(gistId);
      return{ok:true,msg:'Gist aangemaakt ✓',merged:{entries,avond,profiel}};
    }

    // Load remote, merge, push
    let remote;
    try{remote=await ghLoad(token,gistId);}
    catch(e){
      if(e.message==='gist-not-found'){
        // Gist was deleted, create new one
        saveGistId('');
        gistId=await ghCreate(token,payload);
        saveGistId(gistId);
        return{ok:true,msg:'Nieuw gist aangemaakt ✓',merged:{entries,avond,profiel}};
      }
      throw e;
    }
    const mergedEntries=mergeMap(entries,remote.entries);
    const mergedAvond=mergeMap(avond,remote.avond);
    await ghPush(token,gistId,{...payload,entries:mergedEntries,avond:mergedAvond,profiel});
    return{ok:true,msg:`Gesynchroniseerd ✓`,merged:{entries:mergedEntries,avond:mergedAvond,profiel}};
  }catch(e){return{ok:false,msg:e.message};}
}

// ── Date helpers ──────────────────────────────────────────────────────────────
function fmt(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function addDays(d,n){return new Date(d.getFullYear(),d.getMonth(),d.getDate()+n);}
function isWknd(d){return d.getDay()===0||d.getDay()===6;}
function calcStreak(all,key){let s=0;for(let i=0;i<120;i++){const d=new Date();d.setDate(d.getDate()-i);const k=fmt(d);if(all[k])s++;else if(k!==key)break;}return s;}

function herstelScore(l){
  if(!l?.pijn)return null;let pts=(6-l.pijn)*2;
  pts+=l.oefeningen==="Ja"?3:l.oefeningen==="Deels"?1.5:0;
  pts+=(l.sporten||[]).some(x=>x.sport&&x.sport!=="Geen")?1:0;
  const g=l.garmin,ss=l.slaap?.subjectief;pts+=ss?(ss-1)*0.75:0;
  if(g?.gedragen&&g?.bodyBattery!=null)pts+=(g.bodyBattery/100)*2;
  return+(Math.min(10,pts/17*10)).toFixed(1);
}
function scoreColor(v){return v===null?"var(--mu)":v>=8?"#4a9e6a":v>=6?"#8ab84a":v>=4?"#d4944a":"#c0602a";}
function sportLabel(sp=[]){return!sp?.length?"geen sport":sp.map(s=>`${s.sport}${s.duur?" · "+s.duur:""}${s.intensiteit?" · "+s.intensiteit:""}`).join(", ");}
function buildText(qs,ans){return qs.map(q=>{if(q.type==="lichaam"){const l=ans.lichaam||{},g=l.garmin,sl=l.slaap;return`Lichaam: sport: ${sportLabel(l.sporten)} | pijn:${l.pijn?PIJN_L[l.pijn]:"?"} | oef:${l.oefeningen||"?"} | slaap:${sl?.subjectief?SLAAP_L[sl.subjectief]:"?"} | ${g?.gedragen?`BB:${g.bodyBattery} HRV:${g.hrvStatus} slaap:${g.slaapscore}`:"geen garmin"}${l.fysio?" | fysio:"+l.fysio:""}`;}return`${q.q}: ${ans[q.id]||"(niet ingevuld)"}`;}).join("\n");}
function buildChatSys(p){const c=[];if(p?.naam)c.push(`Naam: ${p.naam}`);if(p?.werk)c.push(`Werk/rol: ${p.werk}`);if(p?.klachten)c.push(`Lichamelijke klachten: ${p.klachten}`);const b=c.length?`\n\nAchtergrond:\n${c.join("\n")}`:"";return`Je bent een nieuwsgierige gesprekspartner.${b}\n\nStel 1–2 concrete vervolgvragen op basis van de antwoorden. Toon: informeel, direct. ALLEEN vragen, geen advies, max 3 zinnen, Nederlands.`;}
function buildSumSys(p){const c=[];if(p?.naam)c.push(`Naam: ${p.naam}`);if(p?.werk)c.push(`Werk/rol: ${p.werk}`);if(p?.klachten)c.push(`Lichamelijke klachten: ${p.klachten}`);const b=c.length?`\n\nAchtergrond:\n${c.join("\n")}`:"";return`Analyseer dagstart-entries van de afgelopen week.${b}\n\nMax 150 woorden: patronen, verbanden, feitelijk. GEEN adviezen. Eindig met één observatievraag. Schrijf als data-analist. Nederlands.`;}

// ── Speech hook ───────────────────────────────────────────────────────────────
function useSpeech(){
  const recRef=useRef(null);const[activeId,setActiveId]=useState(null);const[micError,setMicError]=useState(null);
  const supported=!!(window.SpeechRecognition||window.webkitSpeechRecognition);
  const start=useCallback((id,onResult)=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setMicError("Gebruik Chrome of Safari voor spraak.");return;}
    if(recRef.current){try{recRef.current.stop();}catch{}}
    const rec=new SR();rec.lang="nl-NL";rec.continuous=false;rec.interimResults=false;
    rec.onresult=e=>{onResult(Array.from(e.results).map(r=>r[0].transcript).join(" "));setMicError(null);try{rec.stop();}catch{}};
    rec.onerror=e=>{setActiveId(null);if(e.error==="not-allowed")setMicError("Microfoon geblokkeerd — geef toestemming in je browser.");else if(e.error!=="no-speech")setMicError(`Fout: ${e.error}`);};
    rec.onend=()=>{recRef.current=null;setActiveId(null);};recRef.current=rec;
    try{rec.start();setActiveId(id);setMicError(null);}catch{setActiveId(null);setMicError("Microfoon kon niet starten.");}
  },[]);
  const stop=useCallback(()=>{if(recRef.current){try{recRef.current.stop();}catch{}recRef.current=null;}setActiveId(null);},[]);
  return{activeId,start,stop,supported,micError};
}

const PIN_HASH="03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4"; // 1234
async function sha256(s){const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,"0")).join("");}
 
function PinScreen({onUnlock}){
  const[digits,setDigits]=useState([]);const[error,setError]=useState(false);
  async function tap(k){
    if(k==="⌫"){setDigits(d=>d.slice(0,-1));setError(false);return;}
    if(digits.length>=4)return;
    const next=[...digits,k];setDigits(next);
    if(next.length===4){
      const h=await sha256(next.join(""));
      if(h===PIN_HASH){sessionStorage.setItem("ds_pin","1");onUnlock();}
      else{setError(true);setTimeout(()=>{setDigits([]);setError(false);},700);}
    }
  }
  const KEYS=[1,2,3,4,5,6,7,8,9,null,0,"⌫"];
  return(

      for(const[k,v]of Object.entries(res.merged.entries))await sSet(k,v);
      for(const[k,v]of Object.entries(res.merged.avond))await sSet(`${k}_pm`,v);
      setEntries(res.merged.entries);setAvondData(res.merged.avond);
      setStreak(calcStreak(res.merged.entries,todayKey));
    }
    setSyncState(res.ok?'ok':'error');setSyncMsg(res.msg);
  }

  async function toggleTheme(){const n=!light;setLight(n);await sSet("theme",n?"light":"dark");}
  async function saveProfiel(p){setProfiel(p);await sSet("profiel",p);}
  function exportData(){const blob=new Blob([JSON.stringify({version:2,exported:new Date().toISOString(),entries,avond:avondData},null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`dagstart_${todayKey}.json`;a.click();}
  async function importData(e){const f=e.target.files[0];if(!f)return;try{const d=JSON.parse(await f.text());const ie=d.entries||{},ia=d.avond||{};for(const[k,v]of Object.entries(ie))if(/^\d{4}-\d{2}-\d{2}$/.test(k))await sSet(k,v);for(const[k,v]of Object.entries(ia))await sSet(`${k}_pm`,v);const u={...entries,...ie};setEntries(u);setAvondData(p=>({...p,...ia}));setStreak(calcStreak(u,todayKey));if(u[todayKey]){setAnswers(u[todayKey].answers||{});setSaved(true);}setToast({msg:`${Object.keys(ie).length} entries geïmporteerd ✓`,ok:true});}catch(err){setToast({msg:"Import mislukt: "+err.message,ok:false});}e.target.value="";}
  function onIVComplete(iA){setAnswers(p=>({...p,...iA}));setInterview(false);setSaved(false);setEditing(true);setStep(getQs().findIndex(q=>q.type==="lichaam"));}

  const TABS=[{id:"vandaag",icon:"○",lbl:"Vandaag"},{id:"gisteren",icon:"↺",lbl:"Gisteren"},{id:"week",icon:"▦",lbl:"Week"},{id:"stats",icon:"◈",lbl:"Stats"}];

  if(!unlocked)return <PinScreen onUnlock={()=>setUnlocked(true)}/>;
  if(showSetup)return <SetupScreen onDone={()=>setShowSetup(false)}/>;
  if(loading)return <div className="ds" style={{alignItems:"center",justifyContent:"center",display:"flex",minHeight:"100vh"}}><span style={{color:"#6a5e4e",fontSize:12,letterSpacing:2,textTransform:"uppercase"}}>Laden…</span></div>;
  if(interview)return <div className={`ds${light?" light":""}`}><InterviewMode questions={getQs()} existing={answers} onComplete={onIVComplete} onClose={()=>setInterview(false)}/></div>;

  return(
    <div className={`ds${light?" light":""}`}>
      <div className="hdr">
        <div>
          <div className="lbl" style={{marginBottom:3}}>{DAYS[today.getDay()]}{reisdag&&saved?" 🗺":""}</div>
          <div className="serif" style={{fontSize:22,fontWeight:600,lineHeight:1.1}}>{today.getDate()} {MONTHS[today.getMonth()]}</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5}}>
          <button type="button" className="tbtn" onClick={toggleTheme}><span>{light?"🌙":"☀"}</span><span style={{fontSize:11}}>{light?"Donker":"Licht"}</span></button>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            {getGhToken()&&<div style={{display:"flex",alignItems:"center",gap:4}}>
              {syncState==='syncing'?<span className="spinning" style={{fontSize:11,color:"#4a8aaa"}}>↑↓</span>:<div className="sync-dot" style={{background:syncState?syncColor:"var(--br)"}}/>}
              {syncState&&<span style={{fontSize:10,color:syncColor}}>{syncState==='syncing'?"Sync…":syncState==='ok'?"Gesync":syncMsg.slice(0,20)}</span>}
            </div>}
            <div style={{display:"flex",alignItems:"baseline",gap:4}}><div className="serif" style={{fontSize:24,fontWeight:600,color:"var(--a2)",lineHeight:1}}>{streak}</div><div className="lbl">{streak===1?"dag":"dagen"}</div></div>
          </div>
        </div>
      </div>
      <div className="con">
        {tab==="vandaag"&&<VandaagTab mode={mode} setMode={m=>{setMode(m);setStep(0);if(saved)setEditing(true);}} reisdag={reisdag} setReisdag={r=>{setReisdag(r);if(saved)setEditing(true);}} questions={getQs()} answers={answers} setAnswers={setAnswers} saved={saved} editing={editing} onStartEdit={()=>{setEditing(true);setStep(0);}} saving={saving} onSave={handleSave} step={step} setStep={setStep} speech={speech} hasTTS={hasTTS} light={light} onStartIV={()=>setInterview(true)} avond={avondData[todayKey]} onSaveAvond={d=>saveAvond(todayKey,d)} isEvening={isEvening} profiel={profiel} hasKey={!!getApiKey()} morningPriority={answers.bereiken||""}/>}
        {tab==="gisteren"&&<div style={{padding:"16px 16px 0"}}>{entries[yKey]?<EntryView entry={entries[yKey]} label="Gisteren" avond={avondData[yKey]}/>:<div className="empty">Geen dagstart voor gisteren gevonden.</div>}</div>}
        {tab==="week"&&<WeekTab entries={entries} avond={avondData} today={today} todayKey={todayKey} profiel={profiel} hasKey={!!getApiKey()} onSaveEntry={saveEntry} onSaveAvond={saveAvond}/>}
        {tab==="stats"&&<StatsTab entries={entries} avond={avondData} streak={streak} today={today} todayKey={todayKey} entryCount={Object.keys(entries).filter(k=>/^\d{4}-\d{2}-\d{2}$/.test(k)).length} onExport={exportData} onImport={()=>importRef.current?.click()} profiel={profiel} onSaveProfiel={saveProfiel} hasKey={!!getApiKey()} hasGh={!!getGhToken()} syncState={syncState} syncMsg={syncMsg} onSync={manualSync} onOpenSetup={()=>setShowSetup(true)}/>}
      </div>

// ── VandaagTab ────────────────────────────────────────────────────────────────
function VandaagTab({mode,setMode,reisdag,setReisdag,questions,answers,setAnswers,saved,editing,onStartEdit,saving,onSave,step,setStep,speech,hasTTS,light,onStartIV,avond,onSaveAvond,isEvening,profiel,hasKey,morningPriority}){
  const showForm=!saved||editing;const q=questions[step];const isLast=step===questions.length-1;
  function canAdv(){if(!q)return false;if(q.type==="lichaam"){const l=answers.lichaam||{},sp=l.sporten||[];const spOk=sp.length===0||sp.every(s=>s.sport==="Geen"||(s.sport&&s.duur&&s.intensiteit));const gOk=l.garmin?.gedragen===false||l.garmin?.gedragen==null||(l.garmin?.gedragen===true&&l.garmin?.bodyBattery!=null&&l.garmin?.slaapscore!=null&&l.garmin?.hrvStatus);return spOk&&!!l.pijn&&!!l.oefeningen&&gOk&&!!l.slaap?.subjectief;}return(answers[q.id]||"").trim().length>0;}
  if(!showForm)return(<div style={{padding:"16px 16px 0"}}><CompletedView questions={questions} answers={answers} onEdit={onStartEdit} light={light} reisdag={reisdag}/><AvondCheckIn avond={avond} onSave={onSaveAvond} isEvening={isEvening} morningPriority={morningPriority}/>{hasKey&&<ChatPanel questions={questions} answers={answers} profiel={profiel}/>}</div>);

    <div style={{padding:"18px 18px 0"}}>
      {step===0&&(<>
        {(speech.supported||hasTTS)&&<button type="button" className="ivl" onClick={onStartIV}><span style={{fontSize:20}}>🎙</span>Interview modus — handen vrij</button>}
        <div className="mt">{["lite","full"].map(m=><button type="button" key={m} className="mb" onClick={()=>setMode(m)} style={{background:mode===m?(m==="lite"?light?"#deeef8":"#1e3a54":light?"#fdf0e0":"#3d2a0a"):"var(--card)",color:mode===m?(m==="lite"?light?"#1a5a8a":"#6bb3e8":light?"#c27820":"#d4944a"):"var(--mu)",borderColor:mode===m?(m==="lite"?light?"#a8d0e8":"#2a5a84":light?"#e8c080":"#6a4018"):"var(--br)"}}>{m==="lite"?"Lite":"Full"}</button>)}</div>
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
          <button type="button" className={`chip reis${reisdag?" on":""}`} onClick={()=>setReisdag(!reisdag)}>🗺 Reisdag</button>
          <button type="button" className={`chip${answers.gelezen?" on":""}`} onClick={()=>setAnswers(p=>({...p,gelezen:!p.gelezen}))}>📖 Gelezen</button>
          {reisdag&&<span style={{fontSize:12,color:"#5a9a6a",alignSelf:"center"}}>Sport en vragen aangepast</span>}
        </div>
      </>)}
      <div className="prog"><div className="pf" style={{width:`${(step/questions.length)*100}%`}}/></div>
      {step>0&&<button type="button" className="btn-bk" onClick={()=>setStep(s=>s-1)}>← Terug</button>}
      <div className="sn">{step+1} van {questions.length}</div>
      {q.type==="text"?<TextStep q={q} value={answers[q.id]||""} onChange={v=>setAnswers(p=>({...p,[q.id]:v}))} speech={speech} onNext={canAdv()?()=>isLast?onSave():setStep(s=>s+1):null}/>:<LichaamStep value={answers.lichaam||{}} onChange={v=>setAnswers(p=>({...p,lichaam:v}))} light={light} reisdag={reisdag}/>}
      <button type="button" className="btn" disabled={saving||!canAdv()} onClick={()=>isLast?onSave():setStep(s=>s+1)}>{saving?"Opslaan…":isLast?"Afronden ✓":"Volgende →"}</button>
      {q.type==="text"&&!isLast&&<div style={{textAlign:"center",marginTop:10}}><button type="button" onClick={()=>setStep(s=>s+1)} style={{background:"none",border:"none",color:"var(--su)",fontSize:13,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>Sla over</button></div>}

    </div>
  );
}

function TextStep({q,value,onChange,speech,onNext}){
  const ref=useRef(null);useEffect(()=>{ref.current?.focus();},[q.id]);
  const isActive=speech.activeId===q.id;

}

function TimeSlider({label,value,onChange,minHour,maxHour}){
  const STEP=15,total=Math.round((maxHour-minHour)*60/STEP);
  function toStep(v){if(!v)return null;const[h,m]=v.split(":").map(Number);let hrs=h;if(minHour>=19&&h<12)hrs=h+24;return Math.min(total,Math.max(0,Math.round((hrs*60+m-minHour*60)/STEP)));}
  function toTime(s){const mins=minHour*60+s*STEP;const h=Math.floor(mins/60)%24;const m=mins%60;return`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;}
  const s=toStep(value);
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
        <div className="lbl" style={{color:"#4a8aa8"}}>{label}</div>
        <div style={{fontSize:22,fontWeight:500,color:"#7ac4e8",fontFamily:"'DM Sans',sans-serif",minWidth:48,textAlign:"right"}}>{value||"—"}</div>
      </div>
      <input type="range" min={0} max={total} value={s??Math.round(total/2)} step={1} onChange={e=>onChange(toTime(Number(e.target.value)))} style={{accentColor:"#3a6a8a"}}/>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#2a5a6a",marginTop:3}}>
        <span>{toTime(0)}</span><span>{toTime(total)}</span>
      </div>
    </div>
  );
}

function AvondCheckIn({avond,onSave,isEvening,morningPriority}){
  const[open,setOpen]=useState(false);
  const[pijn,setPijn]=useState(avond?.pijn||null);
  const[focus,setFocus]=useState(avond?.focus||null);
  const[prioriteit,setPrioriteit]=useState(avond?.prioriteit||null);
  const[reactief,setReactief]=useState(avond?.reactief||null);
  const[cafeine,setCafeine]=useState(avond?.cafeine??null);
  const[eerste,setEerste]=useState(avond?.eerste||null);
  const[note,setNote]=useState(avond?.note||"");
  const[done,setDone]=useState(!!avond);
  useEffect(()=>{if(avond){setPijn(avond.pijn||null);setFocus(avond.focus||null);setPrioriteit(avond.prioriteit||null);setReactief(avond.reactief||null);setCafeine(avond.cafeine??null);setEerste(avond.eerste||null);setNote(avond.note||"");setDone(true);}},[avond]);

function ChatPanel({questions,answers,profiel}){
  const[open,setOpen]=useState(false);const[msgs,setMsgs]=useState([]);const[input,setInput]=useState("");const[thinking,setThinking]=useState(false);const[done,setDone]=useState(false);const ref=useRef(null);
  useEffect(()=>{ref.current?.scrollIntoView({behavior:"smooth"});},[msgs,thinking]);
  async function start(){setOpen(true);setThinking(true);try{const r=await callApi([{role:"user",content:buildText(questions,answers)}],buildChatSys(profiel));setMsgs([{role:"assistant",content:r}]);}catch(e){setMsgs([{role:"assistant",content:e.message==="no-key"?"Geen API-sleutel — stel in via Stats.":"Verbindingsfout."}]);}setThinking(false);}
  async function send(){if(!input.trim()||thinking||done)return;const t=input.trim();setInput("");const h=[{role:"user",content:buildText(questions,answers)}];msgs.forEach((m,i)=>{if(i===0){h.push({role:"assistant",content:m.content});return;}h.push({role:m.role,content:m.content});});h.push({role:"user",content:t});const n=[...msgs,{role:"user",content:t}];setMsgs(n);setThinking(true);try{const r=await callApi(h,buildChatSys(profiel));const u=[...n,{role:"assistant",content:r}];setMsgs(u);if(u.filter(m=>m.role==="assistant").length>=10)setDone(true);}catch{setMsgs(m=>[...m,{role:"assistant",content:"Verbindingsfout."}]);}setThinking(false);}
  if(!open)return <div style={{marginBottom:16}}><button type="button" onClick={start} style={{width:"100%",padding:"13px 16px",borderRadius:12,background:"transparent",border:"1px solid var(--cb)",color:"var(--su)",fontFamily:"'DM Sans',sans-serif",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}><span style={{fontSize:18}}>◎</span>Verdiep je antwoorden</button></div>;
  return(<div className="card" style={{marginBottom:16}}><div className="lbl" style={{marginBottom:14,display:"flex",alignItems:"center",gap:8}}><span style={{width:6,height:6,borderRadius:"50%",background:"var(--a2)",display:"inline-block"}}/>Verdieping</div><div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:12}}>{msgs.map((m,i)=><div key={i} className={m.role==="assistant"?"cai":"cme"}>{m.content}</div>)}{thinking&&<div className="cai"><div className="dots"><span/><span/><span/></div></div>}{done&&<div style={{textAlign:"center",color:"var(--mu)",fontSize:12,padding:"8px 0"}}>— gesprek afgerond —</div>}<div ref={ref}/></div>{!done&&<div style={{display:"flex",gap:8,alignItems:"flex-end"}}><textarea className="cin" placeholder="Antwoord… (Enter = verstuur)" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} rows={1}/><button type="button" className="csnd" onClick={send} disabled={thinking||!input.trim()}>→</button></div>}</div>);
}

  const[expanded,setExpanded]=useState(null);const[summary,setSummary]=useState(null);const[sumLoading,setSumLoading]=useState(false);const[backfillKey,setBackfillKey]=useState(null);const[backfillLichaam,setBackfillLichaam]=useState({});

  async function genSummary(){setSumLoading(true);const txt=days.map(({d,key})=>{const e=entries[key];if(!e)return`${DAYS[d.getDay()]}: geen entry`;const l=e.answers?.lichaam||{},sl=l.slaap,a=avond[key],hs=herstelScore(l);return`${DAYS[d.getDay()]}: ${sportLabel(l.sporten)} | pijn:${l.pijn?PIJN_L[l.pijn]:"?"} | oef:${l.oefeningen||"?"} | slaap:${sl?.subjectief?SLAAP_L[sl.subjectief]:"?"}${sl?.bedtijd?"/"+sl.bedtijd:""} | herstel:${hs??"-"}${a?` | avond pijn:${PIJN_L[a.pijn]}`:""}`}).join("\n");try{const r=await callApi([{role:"user",content:txt}],buildSumSys(profiel),400);setSummary(r);}catch(e){setSummary(e.message==="no-key"?"Geen API-sleutel.":"Verbindingsfout.");}setSumLoading(false);}

  <EntryView entry={e} label={DAYS[d.getDay()]} avond={a}/>
  {onSaveAvond&&<AvondCheckIn avond={a} onSave={d2=>onSaveAvond(key,d2)} isEvening={true} morningPriority={e.answers?.bereiken||""}/>}
  {key!==todayKey&&onSaveEntry&&(<div style={{marginTop:8}}>{backfillKey===key?(<div style={{background:"var(--gb)",border:"1px solid var(--gr)",borderRadius:12,padding:14}}><div className="lbl-g" style={{marginBottom:12}}>Lichaam bewerken — {DAYS[d.getDay()]}</div><LichaamStep value={backfillLichaam} onChange={setBackfillLichaam} light={false} reisdag={e.reisdag}/><div style={{display:"flex",gap:8,marginTop:14}}><button type="button" onClick={()=>setBackfillKey(null)} style={{flex:1,padding:"10px",borderRadius:10,border:"1px solid var(--br)",background:"transparent",color:"var(--mu)",fontFamily:"'DM Sans',sans-serif",fontSize:13,cursor:"pointer"}}>Annuleer</button><button type="button" onClick={async()=>{await onSaveEntry(key,{...e,answers:{...e.answers,lichaam:backfillLichaam}});setBackfillKey(null);}} style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:"var(--a)",color:"#fff",fontFamily:"'DM Sans',sans-serif",fontSize:13,cursor:"pointer"}}>Opslaan ✓</button></div></div>):(<button type="button" onClick={()=>{setBackfillKey(key);setBackfillLichaam(e.answers?.lichaam||{});}} style={{width:"100%",padding:"10px",borderRadius:10,border:"1px solid var(--br)",background:"transparent",color:"var(--mu)",fontFamily:"'DM Sans',sans-serif",fontSize:13,cursor:"pointer",marginTop:4}}>✏ Lichaam bewerken</button>)}</div>)}
</div>):(<div style={{padding:"8px 4px"}}>
  <div className="empty" style={{paddingTop:16,paddingBottom:16}}>Geen dagstart voor deze dag.</div>
  {key!==todayKey&&onSaveEntry&&(backfillKey===key?(<div style={{background:"var(--gb)",border:"1px solid var(--gr)",borderRadius:12,padding:14}}><div className="lbl-g" style={{marginBottom:12}}>Lichaam invullen — {DAYS[d.getDay()]}</div><LichaamStep value={backfillLichaam} onChange={setBackfillLichaam} light={false} reisdag={false}/><div style={{display:"flex",gap:8,marginTop:14}}><button type="button" onClick={()=>setBackfillKey(null)} style={{flex:1,padding:"10px",borderRadius:10,border:"1px solid var(--br)",background:"transparent",color:"var(--mu)",fontFamily:"'DM Sans',sans-serif",fontSize:13,cursor:"pointer"}}>Annuleer</button><button type="button" onClick={async()=>{await onSaveEntry(key,{date:key,mode:"lite",answers:{lichaam:backfillLichaam},reisdag:false,timestamp:Date.now()});setBackfillKey(null);}} style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:"var(--a)",color:"#fff",fontFamily:"'DM Sans',sans-serif",fontSize:13,cursor:"pointer"}}>Opslaan ✓</button></div></div>):(<button type="button" onClick={()=>{setBackfillKey(key);setBackfillLichaam({});}} style={{width:"100%",padding:"10px",borderRadius:10,border:"1px solid var(--a)",background:"transparent",color:"var(--a)",fontFamily:"'DM Sans',sans-serif",fontSize:13,cursor:"pointer"}}>+ Lichaam & sport invullen</button>))}
</div>)}</div>}</div>);})}</div>);
}

function StatsTab({entries,avond,streak,today,todayKey,entryCount,onExport,onImport,profiel,onSaveProfiel,hasKey,hasGh,syncState,syncMsg,onSync,onOpenSetup}){

  const sf={};Array.from({length:14},(_,i)=>entries[fmt(addDays(today,-i))]).filter(Boolean).forEach(e=>(e.answers?.lichaam?.sporten||[]).forEach(s=>{if(s.sport&&s.sport!=="Geen")sf[s.sport]=(sf[s.sport]||0)+1;}));

  const syncC=syncState==='ok'?'#4a9e6a':syncState==='error'?'#e06040':'#4a8aaa';
  return(<div style={{padding:"16px 16px 0"}}>

          <button type="button" onClick={onOpenSetup} style={{background:"transparent",border:"1px solid #1e4a5a",borderRadius:8,padding:"6px 12px",color:"#4a8aaa",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif"}}>{hasGh?"Wijzigen":"Instellen"}</button>
        </div>
      </div>
      {!hasGh&&<div style={{fontSize:11,color:"#2a5a6a",marginTop:10,lineHeight:1.6}}>Stel GitHub Gist in voor automatische sync tussen PC en iPhone.</div>}
    </div>

    {/* Profiel */}
    <div className="profiel-card"><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:profielOpen?14:0}}><div><div className="lbl-p">Persoonlijk profiel</div>{!profielOpen&&profiel.naam&&<div style={{fontSize:13,color:"var(--tx2)",marginTop:4}}>{profiel.naam}{profiel.werk?` · ${profiel.werk}`:""}</div>}</div><button type="button" onClick={()=>setProfielOpen(o=>!o)} style={{background:"transparent",border:"1px solid #3a2a4a",borderRadius:8,padding:"5px 12px",color:"#9a7ab8",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif"}}>{profielOpen?"Sluiten":"Bewerken"}</button></div>{profielOpen&&(<><div style={{fontSize:12,color:"#7a5a9a",marginBottom:14,lineHeight:1.5}}>Wordt gebruikt door de AI voor verdieping en samenvatting.</div>{[{key:"naam",lbl:"Naam",ph:"Bijv. Maurits",rows:1},{key:"werk",lbl:"Werk & rol",ph:"Bijv. Clinical Marketing Specialist bij Philips IGT, Shanghai",rows:2},{key:"klachten",lbl:"Lichamelijke klachten",ph:"Bijv. Chronische spanning rechterkant (heup, onderrug, trapezius), anterieure bekkenkanteling…",rows:4}].map(({key,lbl,ph,rows})=><div key={key} style={{marginBottom:14}}><div className="lbl-p" style={{marginBottom:6}}>{lbl}</div><textarea className="ta-p" value={draft[key]||""} onChange={e=>setDraft(p=>({...p,[key]:e.target.value}))} placeholder={ph} rows={rows}/></div>)}<button type="button" onClick={()=>{onSaveProfiel(draft);setProfielOpen(false);}} style={{width:"100%",padding:"11px",borderRadius:10,border:"none",background:"#3a2a5a",color:"#c8a8e8",fontFamily:"'DM Sans',sans-serif",fontSize:14,cursor:"pointer"}}>Opslaan ✓</button></>)}{!profielOpen&&!profiel.naam&&<div style={{fontSize:12,color:"#7a5a9a",marginTop:6}}>Voeg naam, werk en klachten toe voor betere AI-antwoorden.</div>}</div>

    {/* Data */}
    <div className="card" style={{marginBottom:14}}><div className="lbl" style={{marginBottom:10}}>{entryCount} entries · lokale opslag</div><div style={{display:"flex",gap:8,flexWrap:"wrap"}}><button type="button" className="dbtn" onClick={onExport}><span>⬇</span>Exporteer JSON</button><button type="button" className="dbtn" onClick={onImport}><span>⬆</span>Importeer JSON</button></div></div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>{stats.map(s=><div key={s.lbl} className="scrd"><div className="serif" style={{fontSize:28,fontWeight:600,color:s.col,lineHeight:1}}>{s.val}</div><div className="lbl" style={{marginTop:6}}>{s.unit}</div><div style={{fontSize:11,color:"var(--mu)",marginTop:5}}>{s.lbl}</div></div>)}</div>

    {hasTrend&&<div className="card" style={{marginBottom:10}}><div className="lbl" style={{marginBottom:4}}>Herstelscore — 14 dagen</div><div style={{fontSize:11,color:"var(--mu)",marginBottom:12}}>0–10 op pijn + oefeningen + sport + slaap + Garmin BB</div><div style={{display:"flex",alignItems:"flex-end",gap:4,height:60,marginBottom:6}}>{trend14.map(({hs},i)=><div key={i} style={{flex:1,height:"100%",display:"flex",flexDirection:"column",justifyContent:"flex-end",alignItems:"center",position:"relative"}}>{hs!==null&&<><div style={{position:"absolute",top:0,fontSize:8,color:scoreColor(hs),fontWeight:600}}>{hs}</div><div style={{width:"70%",borderRadius:"4px 4px 0 0",background:scoreColor(hs),height:`${(hs/10)*54+4}px`,opacity:.85}}/></>}</div>)}</div><div style={{display:"flex",justifyContent:"space-between"}}>{trend14.filter((_,i)=>i%2===0).map(({d},i)=><div key={i} style={{fontSize:9,color:"var(--mu)"}}>{DAYS_S[d.getDay()]}</div>)}</div></div>}

    {hasSlaapData&&<div className="card" style={{marginBottom:10}}><div className="lbl" style={{marginBottom:4}}>Slaap — subjectief vs Garmin</div><div style={{fontSize:11,color:"var(--mu)",marginBottom:12}}>Gekleurd = eigen gevoel · Stip = Garmin</div><div style={{display:"flex",alignItems:"flex-end",gap:4,height:60,position:"relative"}}>{trend14.map(({slSub,slGar},i)=><div key={i} style={{flex:1,height:"100%",display:"flex",flexDirection:"column",justifyContent:"flex-end",alignItems:"center",position:"relative"}}>{slSub&&<div style={{width:"60%",borderRadius:"3px 3px 0 0",background:SLAAP_C[slSub],height:`${(slSub/5)*52+4}px`,opacity:.8}}/>}{slGar!=null&&<div style={{width:5,height:5,borderRadius:"50%",background:"var(--gn)",position:"absolute",bottom:`${(slGar/100)*60-2}px`,zIndex:2}}/>}</div>)}{(()=>{const pts=trend14.map((p,i)=>p.slGar!=null?`${((i+.5)/trend14.length)*100}%,${60-(p.slGar/100)*60}`:null).filter(Boolean);return pts.length>1?<svg style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",overflow:"visible",pointerEvents:"none"}}><polyline points={pts.join(" ")} fill="none" stroke="var(--gn)" strokeWidth="1.5" strokeOpacity=".55"/></svg>:null;})()}</div><div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>{trend14.filter((_,i)=>i%2===0).map(({d},i)=><div key={i} style={{fontSize:9,color:"var(--mu)"}}>{DAYS_S[d.getDay()]}</div>)}</div></div>}

    <div className="card" style={{marginBottom:10}}><div className="lbl" style={{marginBottom:12}}>Pijn — 7 dagen</div><div style={{display:"flex",alignItems:"flex-end",gap:6,height:60}}>{pain7.map(({d,pO,pA},i)=><div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}><div style={{width:"100%",display:"flex",gap:2,alignItems:"flex-end",height:52,justifyContent:"center"}}><div style={{width:"45%",borderRadius:"3px 3px 0 0",background:pO?PIJN_C[pO]:"var(--pb)",height:pO?`${(pO/5)*44+4}px`:"4px",opacity:pO?1:.3}}/><div style={{width:"45%",borderRadius:"3px 3px 0 0",background:pA?"#4a9e6a":"var(--pb)",height:pA?`${(pA/5)*44+4}px`:"4px",opacity:pA?.6:.2}}/></div><div style={{fontSize:9,color:"var(--mu)"}}>{DAYS_S[d.getDay()]}</div></div>)}</div><div style={{display:"flex",gap:14,marginTop:8}}>{[["#d4944a","Ochtend"],["#4a9e6a","Avond"]].map(([c,l])=><div key={l} style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:10,height:10,borderRadius:2,background:c}}/><span style={{fontSize:10,color:"var(--mu)"}}>{l}</span></div>)}</div></div>

    {topSp.length>0&&<div className="card" style={{marginBottom:10}}><div className="lbl" style={{marginBottom:12}}>Meest gedaan — 14 dagen</div>{topSp.map(([sp,ct])=><div key={sp} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}><div style={{width:80,fontSize:13,color:"var(--tx)"}}>{sp}</div><div style={{flex:1,height:6,background:"var(--pb)",borderRadius:3,overflow:"hidden"}}><div style={{width:`${(ct/14)*100}%`,height:"100%",background:"var(--a)",borderRadius:3}}/></div><div style={{fontSize:12,color:"var(--mu)",width:28,textAlign:"right"}}>{ct}×</div></div>)}</div>}

    {fysioNotes.length>0&&<div className="card" style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:fysioOpen?14:0}}><div><div className="lbl-f">Fysio-notities</div><div style={{fontSize:11,color:"var(--mu)",marginTop:3}}>{fysioNotes.length} notities</div></div><div style={{display:"flex",gap:8}}><button type="button" onClick={()=>{const t=fysioNotes.map(([k,e])=>`${k}\n${e.answers.lichaam.fysio}`).join("\n\n");navigator.clipboard?.writeText(t).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);}).catch(()=>setCopied(false));}} style={{background:"transparent",border:"1px solid var(--fr)",color:copied?"#4a9e6a":"#5a8a5a",borderRadius:8,padding:"5px 10px",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif"}}>{copied?"✓ Gekopieerd":"📋 Kopieer"}</button><button type="button" onClick={()=>setFysioOpen(o=>!o)} style={{background:"transparent",border:"1px solid var(--br)",color:"var(--mu)",borderRadius:8,padding:"5px 10px",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif"}}>{fysioOpen?"Verberg":"Toon"}</button></div></div>{fysioOpen&&fysioNotes.map(([k,e])=><div key={k} style={{borderTop:"1px solid var(--br)",paddingTop:12,marginTop:8}}><div style={{fontSize:11,color:"var(--mu)",marginBottom:6}}>{k}</div><div style={{fontSize:13,color:"var(--tx2)",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{e.answers.lichaam.fysio}</div></div>)}</div>}

    <div className="card"><div className="lbl" style={{marginBottom:12}}>Afgelopen 30 dagen</div><div className="hmap">{last30.map(({d,key,entry})=><div key={key} className="hc" style={{background:entry?(entry.mode==="lite"?"var(--hl)":"var(--hf)"):"var(--he)",color:entry?(entry.mode==="lite"?"var(--hlc)":"var(--hfc)"):"var(--hec)",border:key===todayKey?"1px solid var(--a2)":"none"}}>{d.getDate()}</div>)}</div><div style={{display:"flex",gap:14,marginTop:10}}>{[["var(--hl)","Lite"],["var(--hf)","Full"],["var(--he)","Leeg"]].map(([bg,l])=><div key={l} style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:11,height:11,borderRadius:3,background:bg}}/><span style={{fontSize:11,color:"var(--mu)"}}>{l}</span></div>)}</div></div>
  </div>);
}

// ── InterviewMode ─────────────────────────────────────────────────────────────
function InterviewMode({questions,existing,onComplete,onClose}){
  const textQs=questions.filter(q=>q.type==="text");
  const[idx,setIdx]=useState(0);const[phase,setPhase]=useState("intro");
  const[transcript,setTr]=useState("");const[interim,setIn]=useState("");
  const iARef=useRef({...existing});const recRef=useRef(null),phRef=useRef("intro");
  phRef.current=phase;
  async function getVoice(){let v=window.speechSynthesis?.getVoices()||[];if(!v.length){await new Promise(r=>{window.speechSynthesis.onvoiceschanged=r;setTimeout(r,800);});v=window.speechSynthesis?.getVoices()||[];}return v.find(x=>x.lang==="nl-NL")||v.find(x=>x.lang.startsWith("nl-NL"))||v.find(x=>x.lang.startsWith("nl-")&&!x.lang.startsWith("nl-BE"))||v.find(x=>x.lang.startsWith("nl"))||v[0]||null;}
  const speak=useCallback(async(text,onEnd)=>{if(!window.speechSynthesis)return onEnd?.();window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang="nl-NL";u.rate=0.93;const v=await getVoice();if(v)u.voice=v;u.onend=()=>onEnd?.();u.onerror=()=>onEnd?.();window.speechSynthesis.speak(u);},[]);
  const stopRec=useCallback(()=>{if(recRef.current){try{recRef.current.abort();}catch{}recRef.current=null;}setIn("");},[]);
  const startRec=useCallback(()=>{const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){setPhase("paused");return;}stopRec();const rec=new SR();rec.lang="nl-NL";rec.continuous=true;rec.interimResults=true;rec.onresult=e=>{let f="",n="";for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)f+=e.results[i][0].transcript+" ";else n+=e.results[i][0].transcript;}if(f)setTr(p=>p+f);setIn(n);};rec.onend=()=>{if(phRef.current==="listening"){try{rec.start();}catch{}}};rec.onerror=e=>{if(e.error!=="no-speech")setPhase("paused");};recRef.current=rec;try{rec.start();setPhase("listening");}catch{setPhase("paused");};},[stopRec]);
  function speakQ(i){const q=textQs[i];if(!q)return;setTr("");setIn("");setPhase("speaking");speak(q.q,()=>startRec());}
  useEffect(()=>{setPhase("speaking");speak("Start de dagstart. Ik lees elke vraag voor. Spreek je antwoord in en tik daarna op Volgende.",()=>speakQ(0));return()=>{window.speechSynthesis?.cancel();stopRec();};},[]);
  function saveAnswer(tr){const q=textQs[idx];if(q&&tr.trim())iARef.current={...iARef.current,[q.id]:tr.trim()};}
  function advance(){stopRec();saveAnswer(transcript);setTr("");if(idx===textQs.length-1){window.speechSynthesis?.cancel();setPhase("done");speak("Klaar. Vul daarna de lichaamscheck in.");}else{const n=idx+1;setIdx(n);speakQ(n);}}
  function finish(){stopRec();saveAnswer(transcript);onComplete({...iARef.current});}
  const progress=((idx+(phase==="done"?1:0))/textQs.length)*100,curQ=textQs[idx];
  const IR="1px solid var(--ir)";
  if(phase==="done")return(<div className="ivs"><div style={{padding:"18px 22px 14px",borderBottom:IR,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div className="lbl" style={{color:"#4a9e6a"}}>Interview voltooid ✓</div><button type="button" onClick={finish} style={{background:"transparent",border:"none",color:"var(--mu)",cursor:"pointer",fontSize:13,fontFamily:"'DM Sans',sans-serif"}}>Sluiten</button></div><div style={{flex:1,padding:"28px 26px",overflowY:"auto"}}><div style={{fontSize:36,textAlign:"center",marginBottom:16}}>✓</div><div className="serif" style={{fontSize:20,color:"var(--tx)",textAlign:"center",marginBottom:10}}>Dagstart compleet</div><div style={{fontSize:13,color:"var(--su)",textAlign:"center",lineHeight:1.7,marginBottom:24}}>Vul daarna de lichaamscheck in.</div>{textQs.map(q=><div key={q.id} className="card" style={{marginBottom:8}}><div style={{fontSize:12,color:"var(--mu)",marginBottom:6}}>{q.q}</div><div style={{fontSize:14,color:"var(--tx2)",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{iARef.current[q.id]||<em style={{color:"var(--di)"}}>Niet ingevuld</em>}</div></div>)}</div><div style={{padding:"18px 22px 30px",borderTop:IR}}><button type="button" className="ivnx" onClick={finish}>Ga naar lichaamscheck →</button></div></div>);
  return(<div className="ivs"><div style={{padding:"18px 22px 14px",borderBottom:IR,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div className="lbl" style={{marginBottom:6}}>Interview · {idx+1}/{textQs.length}</div><div style={{width:130,height:3,background:"var(--ir)",borderRadius:2,overflow:"hidden"}}><div style={{width:`${progress}%`,height:"100%",background:"var(--a)",borderRadius:2,transition:"width .4s"}}/></div></div><button type="button" onClick={()=>{window.speechSynthesis?.cancel();stopRec();onClose();}} style={{background:"transparent",border:IR,borderRadius:8,padding:"6px 12px",color:"var(--mu)",cursor:"pointer",fontSize:13,fontFamily:"'DM Sans',sans-serif"}}>Stop</button></div><div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",padding:"28px 26px",overflowY:"auto"}}><div className="ivst" style={{marginBottom:22,color:phase==="listening"?"#e06040":"var(--mu)"}}>{phase==="listening"?<><div className="recdot"/><span>Luistert…</span></>:phase==="speaking"?<><div style={{display:"flex",alignItems:"flex-end",height:18}}><span className="wb"/><span className="wb"/><span className="wb"/><span className="wb"/><span className="wb"/></div><span style={{color:"var(--a)"}}>Spreekt…</span></>:<><span style={{width:8,height:8,borderRadius:"50%",background:"var(--mu)",display:"inline-block"}}/><span>Gepauzeerd</span></>}</div><div style={{fontSize:24,lineHeight:1.35,color:"var(--tx)",marginBottom:8,fontFamily:"'Playfair Display',serif"}}>{curQ?.q}</div><div style={{fontSize:13,color:"var(--su)",marginBottom:28}}>{curQ?.hint}</div><div className="ivbox">{transcript||<span style={{color:"var(--di)"}}>Jouw antwoord verschijnt hier…</span>}{interim&&<span style={{color:"var(--mu)"}}> {interim}</span>}</div></div><div style={{padding:"18px 22px 30px",borderTop:IR,display:"flex",flexDirection:"column",gap:10}}><button type="button" className="ivnx" onClick={advance} disabled={phase==="speaking"}>{idx===textQs.length-1?"Afronden ✓":"Volgende →"}</button><div style={{display:"flex",gap:10}}><button type="button" className="ivsb" onClick={()=>speakQ(idx)} disabled={phase==="speaking"}>🔁 Herhaal</button><button type="button" className="ivsb" onClick={()=>phase==="listening"?(stopRec(),setPhase("paused")):startRec()}>{phase==="listening"?"⏸ Pauzeer":"🎙 Hervat"}</button></div></div></div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
